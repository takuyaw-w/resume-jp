name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - archive_label: windows-x64
            runs_on: ubuntu-latest
          - archive_label: linux-x64
            runs_on: ubuntu-latest
          - archive_label: darwin-arm64
            runs_on: ubuntu-latest

    runs-on: ${{matrix.runs_on}}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
      
      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Generate third-party licenses
        run: deno task licenses

      - name: Build release artifact
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          deno task release --version "$VERSION" --target "${{matrix.archive_label}}"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/releases/*
