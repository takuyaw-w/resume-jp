name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  licenses:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Generate third-party licenses
        run: deno task licenses

      - name: Upload third-party licenses artifact
        uses: actions/upload-artifact@v7
        with:
          name: third-party-licenses
          path: THIRD_PARTY_LICENSES.txt


  build:
    needs: licenses
    strategy:
      fail-fast: false
      matrix:
        include:
          - archive_label: windows-x64
            runs_on: windows-latest
          - archive_label: linux-x64
            runs_on: ubuntu-latest
          - archive_label: darwin-arm64
            runs_on: macos-latest

    runs-on: ${{matrix.runs_on}}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      
      - name: Download third-party licenses artifact
        uses: actions/download-artifact@v8
        with:
          name: third-party-licenses
          path: .

      - name: Build release artifact
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          deno task release --version "$VERSION" --target "${{matrix.archive_label}}"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/releases/*
